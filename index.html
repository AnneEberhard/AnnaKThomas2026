<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AnnaKThomas</title>
    <script src="scripts/special-sites.js"></script>
    <script src="scripts/script.js"></script>
    <script src="scripts/init.js"></script>
    <script src="scripts/sidebar.js"></script>
    <script
      src="https://js-de.sentry-cdn.com/c33733f03d9e6d2e13d1680a4b658e92.min.js"
      crossorigin="anonymous"
    ></script>
    <link
      rel="icon"
      type="image/png"
      href="assets/img/logo/Anna-reverse-transparent.png"
    />
    <link rel="stylesheet" href="styles/fonts.css" />
    <link rel="stylesheet" href="styles/styles-templates.css" />
    <link rel="stylesheet" href="styles/styles.css" />
  </head>
  <body onload="init()">
    <div w3-include-html="templates/header.html"></div>
    <div w3-include-html="templates/background.html"></div>
    <div class="mainContainer">
      <div class="mainMiddleContainer">
        <div id="home" class="">
          <div id="homeTop"></div>
          <div id="homeBottom"></div>
        </div>
        <div class="dividerSmall"></div>
        <div id="about" class="">
          <div id="aboutMeHeadline"></div>
          <div id="aboutMeContainer">
            <div class="profilePicContainer">
              <img
                class="profilePic"
                src="/assets/img/annakthomas.jpg"
                alt="Anna K. Thomas Profile pic"
              />
              <a
                href="https://www.amazon.de/stores/Anna-K.-Thomas/author/B073SF49JG?ref=ap_rdr&store_ref=ap_rdr&isDramIntegrated=true&shoppingPortalEnabled=true"
                >Anna K. Thomas bei Amazon</a
              >
            </div>
            <div id="aboutMeText" class="bookContainerText"></div>
          </div>
        </div>
        <div id="fantasy" class="">
          <div class="dividerSmall"></div>
          <div id="fantasyTop"></div>
          <div id="fantasyNav"></div>
        </div>
        <div class="dividerSmall"></div>
        <div id="historical" class="">
          <div id="historicalTop"></div>
          <div id="historicalNav"></div>
        </div>
        <div class="dividerSmall"></div>
        <div id="novellas" class="">
          <div id="novellasTop"></div>
          <div id="novellasBottom"></div>
          <div id="novellasNav"></div>
        </div>
        <div class="dividerSmall"></div>
        <div id="buy" class="">
          <div id="buyTop"></div>
          <div id="buyBottom"></div>
          <div id="buyNav"></div>
        </div>
      </div>
      <div id="sidebar"></div>
    </div>
    <div w3-include-html="templates/footer.html"></div>
    <div class="scrollToTopButton">
      <svg
        onclick="scrollToTop()"
        class="arrowUp"
        viewBox="0 0 39 39"
        fill="none"
        xmlns="http://www.w3.org/2000/svg"
      >
        <path
          d="M18 15.828L13.343 20.485C12.9525 20.8755 12.3194 20.8755 11.929 20.485C11.5385 20.0945 11.5385 19.4615 11.929 19.071L18.2928 12.7071C18.6834 12.3166 19.3165 12.3166 19.7071 12.7071L26.071 19.071C26.4614 19.4615 26.4614 20.0945 26.071 20.485C25.6805 20.8755 25.0474 20.8755 24.657 20.485L20 15.828L20 27C20 27.5523 19.5522 28 19 28C18.4477 28 18 27.5523 18 27L18 15.828Z"
          fill="grey"
        />
        <rect
          x="1"
          y="1"
          width="37"
          height="37"
          rx="18.5"
          stroke="white"
          stroke-width="2"
        />
      </svg>
    </div>
  </body>
</html>
